section: x11
installed_size: 6604
essential: false
icon: assets/images/source/ic_launcher_border.png

# Post-installation tasks:
# 1. Inject StartupWMClass into the system .desktop file for correct icon association
# 2. Remove conflicting hoperay.desktop files from users' .local directories (cleanup AppImage artifacts)
# 3. Update the desktop database to apply changes immediately
postinstall_scripts:
  - echo "Setting up HopeRay..."
  - sudo sed -i '/^\[Desktop Entry\]/a StartupWMClass=app.hoperay.com' "/usr/share/applications/hoperay.desktop"
  - echo "Search and remove hoperay.desktop from .local"
  - for user_dir in /home/*; do if [ -f "$user_dir/.local/share/applications/hoperay.desktop" ]; then rm -f "$user_dir/.local/share/applications/hoperay.desktop"; echo "Found and removed hoperay.desktop from $user_dir .local"; fi; done
  - update-desktop-database /usr/share/applications
  - echo "HopeRay is ready to use :)"

# Post-uninstallation tasks:
# 1. Iterate through all user directories to remove Hiddify configuration and data
# 2. Clean up root user data to ensure a clean removal
postuninstall_scripts:
  - echo "Removing HopeRay user data..."
  - for user_dir in /home/*; do if [ -d "$user_dir/.local/share/hoperay" ]; then rm -rf "$user_dir/.local/share/hoperay"; echo "Removed data from $user_dir"; fi; done
  - rm -rf /root/.local/share/hoperay
  - echo "HopeRay data cleanup complete."

